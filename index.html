<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f7f4;--ink:#0f0f0f;--ink2:#3a3a3a;--muted:#888;--border:#e2dfd8;--surface:#f0ede6;--s2:#e8e5de;--green:#1e6e42;--red:#8a1f1f;--gold:#7a5c00}
html,body{height:100%;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);overflow:hidden}
button{font-family:inherit;cursor:pointer}
.screen{position:absolute;inset:0;overflow-y:auto;display:none;flex-direction:column}
.screen.active{display:flex}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border)}

/* HOME */
#home{padding:0}
.home-hero{padding:40px 28px 28px;border-bottom:1px solid var(--border)}
.eyebrow{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.home-title{font-size:30px;font-weight:500;line-height:1.15;margin-bottom:6px}
.home-sub{font-size:13px;color:var(--ink2);margin-bottom:20px}
.prog-row{display:flex;align-items:center;gap:10px}
.prog-bar{flex:1;height:2px;background:var(--border)}
.prog-fill{height:100%;background:var(--ink);transition:width .5s}
.prog-label{font-size:11px;color:var(--muted);white-space:nowrap}
.modules-list{padding:20px 28px 60px}
.layer-label{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:24px 0 10px;display:flex;align-items:center;gap:10px}
.layer-label::after{content:'';flex:1;height:1px;background:var(--border)}
.mod-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .15s}
.mod-row:hover{opacity:.65}
.mod-num{font-size:10px;color:var(--muted);width:28px;flex-shrink:0;letter-spacing:.05em}
.mod-info{flex:1}
.mod-title{font-size:14px;font-weight:500}
.mod-meta{font-size:11px;color:var(--muted);margin-top:2px}
.mod-ico{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .2s}
.mod-ico.done{background:var(--ink);border-color:var(--ink);color:var(--bg)}

/* MODULE LIST */
#module{padding:0}
.topbar{display:flex;align-items:center;gap:12px;padding:18px 24px;border-bottom:1px solid var(--border);flex-shrink:0}
.back{font-size:13px;background:none;border:none;color:var(--ink2);padding:0;display:flex;align-items:center;gap:5px}
.tb-title{font-size:13px;font-weight:500;flex:1;text-align:center}
.tb-right{font-size:11px;color:var(--muted);width:48px;text-align:right}
.unit-rows{padding:20px 24px 48px}
.unit-row{display:flex;align-items:flex-start;gap:14px;padding:16px 0;border-bottom:1px solid var(--border);cursor:pointer}
.unit-row:hover .ur-title{text-decoration:underline}
.ur-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--border);margin-top:5px;flex-shrink:0;transition:all .2s}
.ur-dot.done{background:var(--ink);border-color:var(--ink)}
.ur-body{flex:1}
.ur-title{font-size:14px;font-weight:500;margin-bottom:2px}
.ur-meta{font-size:11px;color:var(--muted)}
.ur-tag{display:inline-block;font-size:10px;padding:2px 8px;border:1px solid var(--border);color:var(--ink2);margin-top:5px;letter-spacing:.04em}
.xp-badge{font-size:11px;color:var(--muted);font-weight:500}

/* UNIT */
#unit{padding:0}
.unit-topbar{display:flex;align-items:center;gap:12px;padding:16px 24px;border-bottom:1px solid var(--border);flex-shrink:0}
.u-dots{display:flex;gap:4px;flex:1;justify-content:center}
.u-dot{width:22px;height:3px;border-radius:2px;background:var(--border);transition:background .3s}
.u-dot.done{background:var(--ink)}
.u-dot.cur{background:var(--ink2)}
.unit-body{flex:1;overflow-y:auto;padding:28px 24px}
.u-eyebrow{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.u-heading{font-size:22px;font-weight:500;line-height:1.25;margin-bottom:20px}
.prose{font-size:14px;color:var(--ink2);line-height:1.85;margin-bottom:18px}
.prose strong{color:var(--ink);font-weight:500}
.prose em{font-style:italic;color:var(--ink)}
.callout{border-left:2px solid var(--ink);padding:14px 16px;background:var(--surface);margin:18px 0;font-size:13px;line-height:1.7;color:var(--ink2)}
.callout strong{color:var(--ink);display:block;margin-bottom:4px;font-size:11px;letter-spacing:.1em;text-transform:uppercase}
.unit-footer{padding:16px 24px;border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:8px}
.btn-p{flex:1;padding:14px;background:var(--ink);color:var(--bg);border:none;font-size:13px;font-weight:500;letter-spacing:.02em;transition:opacity .15s}
.btn-p:hover{opacity:.8}
.btn-s{padding:14px 18px;background:transparent;border:1px solid var(--border);color:var(--ink2);font-size:13px}
.btn-s:hover{background:var(--surface)}

/* XP bar */
.xp-bar-wrap{display:flex;align-items:center;gap:8px;margin:12px 0 24px}
.xp-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.xp-track{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.xp-fill{height:100%;background:var(--ink);border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.xp-pts{font-size:11px;color:var(--ink2);font-weight:500;white-space:nowrap}

/* DRAG */
.drag-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.dcol-title{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.drop-zone{min-height:100px;border:1px dashed var(--border);padding:8px;display:flex;flex-direction:column;gap:5px;transition:background .2s}
.drop-zone.over{background:var(--s2)}
.chip{padding:9px 12px;background:var(--surface);border:1px solid var(--border);font-size:13px;cursor:grab;user-select:none;line-height:1.4}
.chip:active{cursor:grabbing;opacity:.6}
.chip.ok{background:#e6f2ec;border-color:#a8d4b8;color:var(--green)}
.chip.bad{background:#fae8e8;border-color:#e0a8a8;color:var(--red)}
.chip-pool{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0 4px}
.drag-result{font-size:13px;color:var(--muted);margin-top:8px;min-height:18px}

/* SLIDER REVEAL */
.slider-reveal{margin:16px 0}
.slider-item{margin-bottom:16px}
.slider-q{font-size:14px;font-weight:500;margin-bottom:8px;line-height:1.45}
.slider-track{position:relative;height:4px;background:var(--border);border-radius:2px;margin:10px 0}
.slider-thumb{position:absolute;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;background:var(--bg);border:2px solid var(--ink);cursor:pointer;transition:left .1s}
.slider-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:2px}
.slider-reveal-text{font-size:13px;line-height:1.65;padding:10px 12px;background:var(--surface);border-left:2px solid var(--ink);margin-top:8px;display:none;color:var(--ink2)}
.slider-reveal-text.show{display:block}

/* CONVO */
.convo-box{border:1px solid var(--border);margin:14px 0}
.convo-hist{padding:14px;min-height:120px;max-height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.msg{max-width:82%;padding:10px 13px;font-size:13px;line-height:1.6}
.msg.them{background:var(--surface);align-self:flex-start;border-radius:0 10px 10px 10px}
.msg.you{background:var(--ink);color:var(--bg);align-self:flex-end;border-radius:10px 0 10px 10px}
.msg.fb{background:#fffce6;border:1px solid #e8d870;align-self:stretch;font-size:12px;color:#5a4800;border-radius:4px;max-width:100%}
.msg.fb.good{background:#e8f4ec;border-color:#8fcca8;color:#1a4a2e}
.msg.fb.bad{background:#fae8e8;border-color:#e0a8a8;color:#5a1a1a}
.convo-opts{padding:10px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:5px}
.copt{text-align:left;padding:10px 12px;background:transparent;border:1px solid var(--border);font-size:13px;color:var(--ink);transition:background .15s;line-height:1.4}
.copt:hover{background:var(--surface)}
.copt:disabled{opacity:.5;cursor:default}

/* CANVAS */
.canvas-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}
.cv-cell{border:1px solid var(--border);padding:12px}
.cv-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.cv-hint{font-size:11px;color:var(--muted);margin-bottom:6px;line-height:1.5;font-style:italic}
.cv-cell textarea{width:100%;border:none;background:transparent;font-family:inherit;font-size:13px;color:var(--ink);resize:none;outline:none;min-height:72px;line-height:1.65}
.cv-cell textarea::placeholder{color:var(--border)}

/* FINANCE */
.fin-scenario{background:var(--surface);padding:14px 16px;font-size:13px;line-height:1.7;margin:14px 0;border-left:2px solid var(--border)}
.fin-opts{display:flex;flex-direction:column;gap:6px;margin:10px 0}
.fopt{padding:12px 14px;border:1px solid var(--border);background:transparent;text-align:left;font-size:13px;color:var(--ink);display:flex;gap:10px;align-items:flex-start;transition:background .15s;line-height:1.45}
.fopt:hover:not(:disabled){background:var(--surface)}
.fopt.good{background:#e8f4ec;border-color:#8fcca8}
.fopt.bad{background:#fae8e8;border-color:#e0a8a8}
.fopt .fl{font-weight:600;width:16px;flex-shrink:0;font-size:12px}
.fin-fb{font-size:13px;padding:12px 14px;background:var(--surface);border-left:2px solid var(--ink);margin-top:8px;line-height:1.7;display:none}
.fin-score{font-size:12px;color:var(--muted);margin-top:12px;text-align:right}

/* PIPELINE */
.pip-stage{margin-bottom:14px}
.pip-stage-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;display:flex;align-items:center;gap:8px}
.pip-stage-label::after{content:'';flex:1;height:1px;background:var(--border)}
.pip-row{display:flex;gap:6px}
.pip-in{flex:1;padding:9px 11px;border:1px solid var(--border);background:var(--bg);font-family:inherit;font-size:13px;color:var(--ink)}
.pip-in:focus{outline:none;border-color:var(--ink)}
.pip-add{padding:0 13px;background:transparent;border:1px solid var(--border);font-size:13px;color:var(--ink2)}
.pip-add:hover{background:var(--surface)}
.pip-items{margin-top:6px;display:flex;flex-direction:column;gap:3px}
.pip-item{padding:8px 11px;background:var(--surface);border:1px solid var(--border);font-size:13px;display:flex;justify-content:space-between;align-items:center}
.pip-del{background:none;border:none;color:var(--muted);font-size:15px;line-height:1}
.pip-summary{margin-top:16px;padding:14px;border:1px solid var(--border);font-size:13px;line-height:1.7;display:none}
.pip-summary strong{display:block;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}

/* TEAM */
.team-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:14px 0}
.pcard{border:1px solid var(--border);padding:14px;cursor:pointer;transition:border-color .2s;background:var(--bg)}
.pcard:hover,.pcard.sel{border-color:var(--ink)}
.pn{font-size:13px;font-weight:500}
.pr{font-size:11px;color:var(--muted);margin-top:2px}
.p-bars{margin-top:8px;display:flex;flex-direction:column;gap:5px}
.p-bar-row{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)}
.p-bar-track{flex:1;height:3px;background:var(--border);border-radius:2px}
.p-bar-fill{height:100%;background:var(--ink);border-radius:2px}
.p-mode{font-size:10px;padding:3px 8px;border:1px solid var(--border);display:inline-block;margin-top:6px;letter-spacing:.04em;color:var(--ink2)}
.detail-box{border:1px solid var(--border);padding:16px;font-size:13px;line-height:1.75;display:none;margin-top:2px;background:var(--surface)}
.detail-box.open{display:block}
.detail-box h4{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}

/* DECISION TREE */
.dtree-path{font-size:11px;color:var(--muted);font-style:italic;margin-bottom:8px;line-height:1.6}
.dnode{border:1px solid var(--border);padding:16px;margin-bottom:10px;background:var(--bg)}
.dq{font-size:14px;font-weight:500;line-height:1.5;margin-bottom:12px}
.dopts{display:flex;flex-direction:column;gap:5px}
.dopt{padding:11px 14px;background:transparent;border:1px solid var(--border);text-align:left;font-size:13px;color:var(--ink);transition:background .15s;line-height:1.4}
.dopt:hover:not(:disabled){background:var(--surface)}
.dopt.chosen{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.doutcome{padding:14px 16px;border-left:3px solid var(--ink);background:var(--surface);font-size:13px;line-height:1.75;margin-top:8px}
.doutcome.good{border-left-color:var(--green);background:#e8f4ec}
.doutcome.bad{border-left-color:var(--red);background:#fae8e8}
.doutcome.ok{border-left-color:var(--gold);background:#fdf8e8}
.dout-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.dout-label.good{color:var(--green)}.dout-label.bad{color:var(--red)}.dout-label.ok{color:var(--gold)}

/* BRAND */
.brand-q{margin-bottom:18px}
.brand-ql{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.brand-qt{font-size:14px;font-weight:500;margin-bottom:6px;line-height:1.4}
.brand-qh{font-size:12px;color:var(--muted);margin-bottom:8px;font-style:italic;line-height:1.5}
.brand-ta{width:100%;padding:11px;border:1px solid var(--border);background:var(--bg);font-family:inherit;font-size:13px;color:var(--ink);resize:none;line-height:1.65}
.brand-ta:focus{outline:none;border-color:var(--ink)}
.brand-prev{background:var(--ink);color:var(--bg);padding:20px;margin-top:16px}
.bp-lbl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:10px}
.bp-name{font-size:20px;font-weight:500;margin-bottom:3px}
.bp-role{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:14px}
.bp-bio{font-size:13px;color:rgba(255,255,255,.75);line-height:1.75;min-height:40px}

/* TOGGLE REVEAL */
.toggle-group{margin:14px 0;display:flex;flex-direction:column;gap:5px}
.toggle-item{border:1px solid var(--border)}
.toggle-head{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;font-size:13px;font-weight:500;background:var(--bg);transition:background .15s;line-height:1.4}
.toggle-head:hover{background:var(--surface)}
.toggle-head .arr{font-size:12px;color:var(--muted);transition:transform .25s}
.toggle-head.open .arr{transform:rotate(90deg)}
.toggle-body{display:none;padding:12px 14px;font-size:13px;line-height:1.75;color:var(--ink2);border-top:1px solid var(--border);background:var(--surface)}
.toggle-body.show{display:block}

/* REVEAL SEQUENCE */
.reveal-seq{margin:14px 0}
.rs-step{padding:14px;border:1px solid var(--border);margin-bottom:5px;cursor:pointer;transition:background .2s;position:relative;overflow:hidden}
.rs-step:not(.unlocked){opacity:.4;cursor:default}
.rs-step.unlocked{background:var(--bg)}
.rs-step.unlocked:hover{background:var(--surface)}
.rs-step.opened{background:var(--surface)}
.rs-step-num{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.rs-step-title{font-size:13px;font-weight:500;margin-bottom:6px}
.rs-step-content{font-size:13px;line-height:1.7;color:var(--ink2);display:none}
.rs-step.opened .rs-step-content{display:block}
.rs-step-lock{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted)}

/* SCALE */
.scale-wrap{margin:16px 0}
.scale-item{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.scale-item:last-child{border-bottom:none}
.scale-label{font-size:13px;font-weight:500;margin-bottom:4px}
.scale-sub{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5}
.scale-track{position:relative;height:6px;background:var(--border);border-radius:3px;margin:0 0 8px}
.scale-fill{height:100%;background:var(--ink);border-radius:3px;width:50%;transition:width .2s}
.scale-input{width:100%;-webkit-appearance:none;appearance:none;height:6px;background:transparent;position:absolute;inset:0;cursor:pointer;opacity:0}
.scale-pct{font-size:12px;color:var(--ink2);text-align:right}
.scale-feedback{font-size:12px;color:var(--muted);font-style:italic;margin-top:4px;line-height:1.5;min-height:16px}

/* SORT */
.sort-list{display:flex;flex-direction:column;gap:5px;margin:14px 0}
.sort-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);cursor:grab;font-size:13px;user-select:none;transition:opacity .2s}
.sort-item.dragging{opacity:.4;cursor:grabbing}
.sort-handle{color:var(--muted);font-size:16px;line-height:1}
.sort-feedback{font-size:13px;color:var(--muted);margin-top:8px;min-height:18px}

/* COMPLETION */
.comp-wrap{padding:40px 28px;flex:1;display:flex;flex-direction:column;justify-content:center}
.comp-mark{font-size:48px;margin-bottom:20px}
.comp-title{font-size:26px;font-weight:500;margin-bottom:8px}
.comp-sub{font-size:14px;color:var(--ink2);margin-bottom:24px;line-height:1.7}
.comp-insight{border-left:2px solid var(--ink);padding:14px 16px;font-size:13px;color:var(--ink2);line-height:1.75;margin-bottom:28px}
.comp-xp{font-size:22px;font-weight:500;color:var(--ink);margin-bottom:4px}
.comp-xp-label{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:28px}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="home">
  <div class="home-hero">
    <div class="eyebrow">Jay MBA Applied</div>
    <div class="home-title">Tu MBA.<br>Tu contexto.</div>
    <div class="home-sub">8 módulos · Diseñado para sesiones de 15 min</div>
    <div class="prog-row">
      <div class="prog-bar"><div class="prog-fill" id="hprog" style="width:0%"></div></div>
      <div class="prog-label" id="hprog-lbl">0%</div>
    </div>
  </div>
  <div class="modules-list" id="mod-list"></div>
</div>

<!-- MODULE -->
<div class="screen" id="module">
  <div class="topbar">
    <button class="back" onclick="goHome()">← Inicio</button>
    <div class="tb-title" id="tb-title"></div>
    <div class="tb-right" id="tb-right"></div>
  </div>
  <div class="unit-rows" id="unit-rows"></div>
</div>

<!-- UNIT -->
<div class="screen" id="unit">
  <div class="unit-topbar">
    <button class="back" onclick="goMod()">← Módulo</button>
    <div class="u-dots" id="udots"></div>
    <div style="width:60px"></div>
  </div>
  <div class="unit-body" id="ubody"></div>
  <div class="unit-footer" id="ufoot"></div>
</div>

<script>
// ──────────────────────────────
// XP SYSTEM
// ──────────────────────────────
let totalXP = 0;
const XP_PER_UNIT = 100;

function xpBar(earned, max) {
  return `<div class="xp-bar-wrap">
    <div class="xp-label">XP</div>
    <div class="xp-track"><div class="xp-fill" id="xpf" style="width:${Math.round(earned/max*100)}%"></div></div>
    <div class="xp-pts" id="xpp">${earned} / ${max}</div>
  </div>`;
}

// ──────────────────────────────
// MODULES DATA
// ──────────────────────────────
const MODS = [

// ════ M01 ════
{title:"De PM técnico a líder estratégico", layer:1,
 units:[
  // U1
  {title:"El cambio de mentalidad", time:"15 min", tag:"Lectura + Clasificación",
   render(c,f){
    c.innerHTML=`
<div class="u-eyebrow">M01 · Unidad 1</div>
<div class="u-heading">No es un cambio de cargo. Es un cambio de pregunta.</div>
<div class="prose">Hay un momento en la carrera de casi todo Project Manager técnico en el que se da cuenta de que algo no cuadra. Ejecuta bien — quizás mejor que nadie en la empresa. Los proyectos salen a tiempo, los vendors están coordinados, los clientes están satisfechos. Pero siente que está corriendo en una cinta: llega a destino, vuelve al inicio, y empieza de nuevo.</div>
<div class="prose">El problema no es la capacidad. Es que toda esa capacidad está apuntando en una sola dirección: <strong>resolver</strong>. Y resolver es valioso, pero no es suficiente para liderar.</div>

<div class="u-eyebrow">M03 · Unidad 1</div>
<div class="u-heading">Estrategia no es un plan. No es una visión. No es una lista de objetivos.</div>
<div class="prose">La palabra "estrategia" es de las más usadas y menos comprendidas en empresas TI. Se llama estrategia a un plan operativo con fechas. Se llama estrategia a un conjunto de objetivos anuales. Se llama estrategia a un presupuesto revisado.</div>
<div class="prose">Nada de eso es estrategia. <strong>Estrategia es la elección deliberada de dónde competir y cómo ganar en ese espacio</strong>. Y esa definición tiene una consecuencia incómoda: implica elegir qué no hacer. Una empresa que quiere ser la mejor en ciberseguridad, en cloud y en infraestructura al mismo tiempo no tiene estrategia — tiene ambición dispersa.</div>
<div class="callout"><strong>La pregunta estratégica real</strong>¿En qué vamos a ser los mejores, para quién, y por qué nos van a elegir a nosotros en lugar de cualquier otra opción? Si no podés responder eso en dos oraciones, no hay estrategia todavía.</div>

${dragHTML(1)}`;

{title:"Finanzas aplicadas al liderazgo TI", layer:2,

   render(c,f){

<div class="u-eyebrow">M04 · Unidad 1</div>
<div class="u-heading">Los números que un líder TI necesita entender — y los que no</div>
<div class="prose">No necesitás ser contador. Necesitás entender exactamente las preguntas financieras que la dirección se hace cuando evalúa un proyecto o una iniciativa. Si podés responderlas antes de que las hagan, tenés ventaja real en la conversación.</div>
<div class="prose">Hay tres preguntas que importan: <strong>¿esto genera margen?</strong> (ingresos menos costos directos), <strong>¿cuándo recuperamos la inversión?</strong> (payback period), y <strong>¿genera flujo o solo utilidad en papel?</strong> (cash flow). Una empresa puede ser rentable en papel y quedarse sin caja — eso es una crisis de liquidez, no de rentabilidad, y son cosas distintas.</div>
<div class="callout"><strong>El error más común en proyectos TI</strong>Confundir margen con rentabilidad. Un proyecto de $200,000 con 15% de margen genera $30,000. Un proyecto de $40,000 con 40% de margen genera $16,000. El primero es más grande, pero si requiere 5x más tiempo del equipo, la rentabilidad real puede ser menor.</div>

<div class="prose">La venta consultiva — que es la que aplica a servicios complejos como infraestructura, cloud o ciberseguridad — no funciona así. <strong>Vender bien en este contexto es hacer las preguntas correctas para entender el problema real del cliente antes de hablar de soluciones</strong>. El cliente compra cuando siente que entendiste su problema mejor que él mismo.</div>
<div class="callout"><strong>La ventaja del líder técnico</strong>Tenés credibilidad que un vendedor puro no tiene. El cliente sabe que entendés lo que estás proponiendo. Usá eso para hacer preguntas que un vendedor no haría — preguntas técnicas que revelan el problema de negocio.</div>

{title:"Construcción y desarrollo de equipo", layer:3,
 units:[

<div class="u-eyebrow">M06 · Unidad 1</div>
<div class="u-heading">El equipo que ejecuta tu visión</div>
<div class="prose">No podés ser líder estratégico sin un equipo que ejecute. Y no podés tener ese equipo sin entender dónde está cada persona hoy y qué necesita para crecer. El error más común es evaluar al equipo en bloque — "está bien" o "está flojo" no son diagnósticos útiles.</div>
<div class="prose">Lo útil es saber quién es excelente en qué, quién necesita desarrollo en qué área específica, y quién está en el rol equivocado. Esas tres cosas son distintas y requieren acciones distintas. La misma persona puede ser excelente en ejecución técnica y necesitar desarrollo en comunicación con clientes.</div>
<div class="callout"><strong>La matriz que importa</strong>Para cada persona y cada tipo de tarea: ¿cuánta competencia tiene? ¿Cuánta motivación? La combinación de esas dos variables determina cómo liderás esa situación. No hay un solo modo de liderazgo correcto — hay el modo correcto para esta persona en esta tarea.</div>`;

  {title:"Delegar sin perder el control", time:"13 min", tag:"Lectura + Revelación",
   render(c,f){
    c.innerHTML=`
<div class="u-eyebrow">M06 · Unidad 2</div>
<div class="u-heading">Delegar no es soltar. Es transferir con criterio.</div>
<div class="prose">El miedo a delegar viene de dos lugares. El primero es no confiar en que el otro lo hará bien — lo cual puede ser realista o puede ser sobreestimación propia. El segundo es no querer asumir la responsabilidad si algo sale mal — lo cual es un problema de liderazgo, no del equipo.</div>
<div class="prose">Delegar correctamente tiene tres componentes que casi nunca se dan todos juntos: <strong>claridad del resultado</strong> (no instrucciones de cómo hacerlo, sino qué tiene que ser verdad cuando esté listo), <strong>checkpoints acordados</strong> (no microgestión, sino momentos de revisión que ambos conocen de antemano), y <strong>autoridad real</strong> (si delegás la tarea pero no la autoridad para tomar decisiones, no delegaste nada — pusiste la responsabilidad en alguien sin darle el poder para cumplirla).</div>
<div class="callout"><strong>El síntoma de delegación sin autoridad</strong>Cuando alguien viene a consultarte por cada decisión pequeña en algo que "ya está delegado". Eso no es dependencia del equipo — es una señal de que nunca transferiste la autoridad real. Y es costoso para los dos.</div>

<div class="u-eyebrow">M06 · Unidad 3</div>
<div class="u-heading">Una conversación honesta vale más que diez evaluaciones</div>

<div class="callout"><strong>Las tres preguntas que abren la conversación real</strong>¿Qué parte de tu trabajo te da más energía? ¿Dónde sentís que te falta herramienta? ¿En qué te gustaría ser mucho mejor en un año? Las respuestas te dicen todo lo que necesitás saber — sin que tengas que diagnosticar nada.</div>

<div class="u-heading">El modo de liderazgo correcto depende de la persona y la tarea, no de tu estilo</div>
<div class="prose">El liderazgo situacional parte de una idea simple: no hay un solo modo de liderazgo correcto. Hay el modo correcto para esta persona en esta tarea en este momento. El error es tener un solo modo y aplicarlo a todo.</div>
<div class="prose">Las dos variables son competencia (¿qué tan capaz es esta persona para esta tarea específica?) y motivación (¿qué tan comprometida está con hacerla?). La misma persona puede necesitar modos distintos para tareas distintas. No es sobre la persona — es sobre la situación.</div>

<div class="prose">Los tres errores más frecuentes: <strong>confirmar lo que ya creemos</strong> (buscar datos que validen la decisión ya tomada en lugar de evaluar opciones genuinamente), <strong>estrechar el foco</strong> (ver solo la dimensión técnica o solo la comercial, nunca las dos), y <strong>evitar el conflicto</strong> (decir que sí porque en ese momento es más fácil que defender la posición correcta).</div>
<div class="callout"><strong>El costo real de la decisión rápida</strong>Una decisión tomada en 5 minutos bajo presión que sale mal puede costar semanas de trabajo correctivo, daño relacional con el cliente, y pérdida de confianza interna. Tomarse 2 horas para decidir bien casi siempre es la inversión correcta.</div>

{title:"Marca personal y liderazgo de influencia", layer:3,

<div class="u-eyebrow">M08 · Unidad 1</div>
<div class="u-heading">Tu marca personal no es tu LinkedIn. Es lo que la gente dice cuando no estás.</div>
<div class="prose">La marca personal no se construye con un bio bien escrito ni con posts en redes. Se construye con comportamientos consistentes a lo largo del tiempo que generan una reputación específica. "Jay es el tipo que siempre llega con opciones, no con problemas." Esa frase es una marca — y se gana con comportamiento, no con comunicación.</div>
<div class="prose">Para un líder en empresas TI, la marca tiene tres dimensiones que, juntas, son difíciles de encontrar: <strong>criterio técnico</strong> (entendés lo que estás haciendo), <strong>visión de negocio</strong> (entendés por qué importa), y <strong>confiabilidad</strong> (hacés lo que decís que vas a hacer). Las tres juntas son una ventaja competitiva personal.</div>
<div class="callout"><strong>La prueba de la silla vacía</strong>Pensá en una reunión donde no estuviste. ¿Cómo te describieron cuando alguien preguntó quién sos? ¿Qué atributos usaron? ¿Eso es lo que querés que digan? Si no, ahí está la brecha entre tu marca actual y la que querés construir.</div>
${revealSeqHTML('brand8')}`;
    revealSeqInit('brand8');
    f.innerHTML=`<button class="btn-p" onclick="completeUnit()">Continuar →</button>`;
   }
  },
  {title:"Influencia sin autoridad formal", time:"13 min", tag:"Lectura + Toggles",
   render(c,f){
    c.innerHTML=`
<div class="u-eyebrow">M08 · Unidad 2</div>
<div class="u-heading">Cómo mover a personas que no te reportan</div>
<div class="prose">En empresas de servicios TI, constantemente trabajás con vendors, clientes, y equipos que no dependen de vos. No podés dar órdenes. No podés usar el poder formal del cargo. Tenés que influir — y eso requiere un set de habilidades completamente distinto.</div>
<div class="prose">El liderazgo de influencia se construye con tres prácticas: hacer que la gente quiera lo mismo que vos querés (no convencer sino alinear intereses), ser útil antes de pedir (la influencia se acumula con valor entregado, no con posición), y ser predecible (que la gente sepa cómo vas a actuar genera la confianza que da influencia real).</div>
<div class="callout"><strong>La cuenta bancaria de la confianza</strong>Cada vez que sos útil sin pedir nada, cada vez que cumplís lo que dijiste, cada vez que sos honesto aunque incomode — hacés un depósito. Cada vez que pedís algo sin haber depositado suficiente, hacés un retiro. Si la cuenta está en cero, la influencia desaparece.</div>
${toggleHTML('inf8')}`;
    toggleInit('inf8');

   }
  },

    c.innerHTML=`
<div class="u-eyebrow">M08 · Unidad 3</div>
<div class="u-heading">La presencia no es carisma. Es claridad.</div>
<div class="prose">La presencia ejecutiva no es hablar fuerte ni tener carisma natural. Es la capacidad de estar completamente presente en la conversación que importa — escuchar de verdad, responder con precisión, sostener la incomodidad sin escapar de ella.</div>
<div class="prose">Se desarrolla con práctica en tres áreas: comunicación verbal (decir lo que querés decir, no lo que creés que el otro quiere escuchar), comunicación no verbal (cuerpo, mirada, ritmo — la gente lee tu estado antes de escuchar tus palabras), y gestión de la incomodidad (las conversaciones difíciles son exactamente donde se gana o se pierde la credibilidad).</div>
<div class="callout"><strong>La incomodidad como señal</strong>Cuando sentís incomodidad antes de una conversación difícil, eso no es una razón para evitarla — es una señal de que importa. Los líderes que huyen de la incomodidad eventualmente no tienen conversaciones reales con nadie.</div>

function completeUnit(){

function updateHome(){
  const total=MODS.reduce((a,m)=>a+m.units.length,0);
  const done=progress.reduce((a,m)=>a+m.filter(Boolean).length,0);
  const pct=Math.round(done/total*100);
  document.getElementById('hprog').style.width=pct+'%';
  document.getElementById('hprog-lbl').textContent=pct+'%';
  const list=document.getElementById('mod-list');
  const layers=[{n:1,label:"Capa 1 · Identidad y Liderazgo"},{n:2,label:"Capa 2 · Negocio y Estrategia"},{n:3,label:"Capa 3 · Operación y Cultura"}];
  list.innerHTML='';
  layers.forEach(layer=>{
    list.innerHTML+=`<div class="layer-label">${layer.label}</div>`;
    MODS.forEach((m,i)=>{
      if(m.layer!==layer.n) return;
      const mp=progress[i];
      const done=mp.every(Boolean);
      list.innerHTML+=`<div class="mod-row" onclick="openMod(${i})">
        <div class="mod-num">M0${i+1}</div>
        <div class="mod-info"><div class="mod-title">${m.title}</div><div class="mod-meta">${m.units.length} unidades · ${m.units[0].tag.split(' ')[0]}…</div></div>
        <div class="mod-ico${done?' done':''}">${done?'✓':'→'}</div>
      </div>`;
    });
  });
}

function renderMod(){
  const m=MODS[curMod];
  document.getElementById('tb-title').textContent=m.title;
  const done=progress[curMod].filter(Boolean).length;
  document.getElementById('tb-right').textContent=done+'/'+m.units.length;
  const rows=document.getElementById('unit-rows');
  rows.innerHTML='';
  m.units.forEach((u,i)=>{
    const d=progress[curMod][i];
    rows.innerHTML+=`<div class="unit-row" onclick="openUnit(${i})">
      <div class="ur-dot${d?' done':''}"></div>
      <div class="ur-body">
        <div class="ur-title">${u.title}</div>
        <div class="ur-meta">${u.time}</div>
        <div class="ur-tag">${u.tag}</div>
      </div>
    </div>`;
  });
}

function renderUnitScreen(){
  const m=MODS[curMod];
  const u=m.units[curUnit];

  const dots=document.getElementById('udots');
  dots.innerHTML=m.units.map((_,i)=>`<div class="u-dot${progress[curMod][i]?' done':i===curUnit?' cur':''}"></div>`).join('');

function dragHTML(idx){

  return `<div class="chip-pool" id="pool${idx}">${d.chips.map((ch,i)=>`<div class="chip" draggable="true" data-di="${idx}" data-ci="${i}" ondragstart="dStart(event)" ontouchstart="tStart(event)">${ch}</div>`).join('')}</div>

    <div><div class="dcol-title">${d.colA}</div><div class="drop-zone" id="dza${idx}" ondragover="dOver(event)" ondrop="dDrop(event,'A','${idx}')" ontouchend="tDrop(event,'A','${idx}')"></div></div>
    <div><div class="dcol-title">${d.colB}</div><div class="drop-zone" id="dzb${idx}" ondragover="dOver(event)" ondrop="dDrop(event,'B','${idx}')" ontouchend="tDrop(event,'B','${idx}')"></div></div>
  </div>
  <div class="drag-result" id="dr${idx}"></div>`;
}
function dragInit(idx){}
let _dragEl=null,_touchEl=null;
function dStart(e){_dragEl=e.target;}
function dOver(e){e.preventDefault();e.currentTarget.classList.add('over');}
function dDrop(e,zone,idx){
  e.preventDefault();e.currentTarget.classList.remove('over');
  if(_dragEl) e.currentTarget.appendChild(_dragEl);_dragEl=null;
}
function tStart(e){_touchEl=e.currentTarget;}
function tDrop(e,zone,idx){
  if(!_touchEl) return;
  document.getElementById('dz'+zone.toLowerCase()+idx).appendChild(_touchEl);_touchEl=null;
}
function checkDrag(idx){
  const d=DRAG_DATA[idx];
  let ok=0;
  ['a','b'].forEach(z=>{
    document.querySelectorAll(`#dz${z}${idx} .chip`).forEach(chip=>{
      const ci=parseInt(chip.dataset.ci);
      const expected=d.correct[ci]===0&&z==='a'||d.correct[ci]===1&&z==='b';
      chip.classList.toggle('ok',expected);
      chip.classList.toggle('bad',!expected);
      if(expected) ok++;
    });
  });
  document.getElementById('dr'+idx).textContent=`${ok} / ${d.chips.length} correctos`;
}

function sortHTML(key){
  const d=SORT_DATA[key||'default'];
  const items=[...d.items].sort(()=>Math.random()-.5);
  return `<div class="sort-list" id="sl${key||'def'}" ondragover="sortOver(event)" ondrop="sortDrop(event)">`+
  items.map((item,i)=>`<div class="sort-item" draggable="true" data-sort="${item}" ondragstart="sortStart(event)"><span class="sort-handle">⠿</span><span>${item}</span></div>`).join('')+
  `</div><div class="sort-feedback" id="srt${key||'def'}"></div>`;
}
function sortInit(key){}
let _sortEl=null;
function sortStart(e){_sortEl=e.currentTarget;}
function sortOver(e){e.preventDefault();}
function sortDrop(e){
  e.preventDefault();
  if(!_sortEl) return;
  const list=e.currentTarget;
  const items=[...list.querySelectorAll('.sort-item')];
  const target=e.target.closest('.sort-item');
  if(target&&target!==_sortEl){
    const idx=items.indexOf(target);
    list.insertBefore(_sortEl,idx>items.indexOf(_sortEl)?target.nextSibling:target);
  }
}
function checkSort(key){
  const d=SORT_DATA[key||'default'];
  const list=document.getElementById('sl'+(key||'def'));
  const items=[...list.querySelectorAll('.sort-item')].map(el=>el.dataset.sort);
  let ok=0;
  items.forEach((item,i)=>{if(item===d.items[d.correct[i]]) ok++;});
  const fb=document.getElementById('srt'+(key||'def'));
  fb.textContent=ok===d.items.length?`✓ Orden correcto. ${d.explanation}`:`${ok}/${d.items.length} en la posición correcta. ${d.explanation}`;
}

function convoInit(c,f,scenario){
  c.innerHTML+=`<div class="convo-box"><div class="convo-hist" id="chist"></div><div class="convo-opts" id="copts"></div></div>`;
  let step=0;
  function renderStep(){
    const hist=document.getElementById('chist');
    const opts=document.getElementById('copts');
    if(!hist) return;
    const s=scenario[step];
    if(s.from==='them'){
      const msg=document.createElement('div');
      msg.className='msg them';msg.textContent=s.msg;
      hist.appendChild(msg);hist.scrollTop=hist.scrollHeight;
      opts.innerHTML=s.opts.map((o,i)=>`<button class="copt" onclick="pickCopt(${i})">${o.t}</button>`).join('');
    }
    window.pickCopt=function(i){
      const o=s.opts[i];
      opts.querySelectorAll('.copt').forEach(b=>b.disabled=true);
      const you=document.createElement('div');
      you.className='msg you';you.textContent=o.t;hist.appendChild(you);
      const fb=document.createElement('div');
      fb.className=`msg fb ${o.q}`;fb.textContent=o.fb;hist.appendChild(fb);
      hist.scrollTop=hist.scrollHeight;opts.innerHTML='';
      step++;
      if(step<scenario.length){setTimeout(renderStep,700);}
      else{const cont=document.getElementById('convo-cont');if(cont) cont.style.display='block';}
    };
  }
  renderStep();
}

    const box=document.getElementById('detbox');
    box.className='detail-box open';
    box.innerHTML=`<h4>${p.name} · ${p.role}</h4>${p.notes}`;
  };
}

// ──────────────────────────────
// DECISION TREE
// ──────────────────────────────
function decisionInit(c,f){
  c.innerHTML+=`<div id="dtree"></div>`;
  f.innerHTML=`<button class="btn-p" id="dt-cont" onclick="completeUnit()" style="display:none">Continuar →</button>`;
  const path=[];
  function renderNode(node,depth){
    const dt=document.getElementById('dtree');
    if(!dt) return;
    if(path.length){
      const pd=document.createElement('div');
      pd.className='dtree-path';pd.textContent='Camino: '+path.join(' → ');
      dt.appendChild(pd);
    }
    if(node.outcome){
      const out=document.createElement('div');
      out.className=`doutcome ${node.outcome.type}`;
      out.innerHTML=`<div class="dout-label ${node.outcome.type}">${node.outcome.label}</div>${node.outcome.text}`;
      dt.appendChild(out);
      document.getElementById('dt-cont').style.display='block';
      return;
    }
    const nd=document.createElement('div');
    nd.className='dnode';nd.id='dn'+depth;
    nd.innerHTML=`<div class="dq">${node.q}</div><div class="dopts">${node.opts.map((o,i)=>`<button class="dopt" onclick="pickD(${i},${depth})">${o.text}</button>`).join('')}</div>`;
    dt.appendChild(nd);
    window.pickD=function(i,d){
      document.querySelectorAll(`#dn${d} .dopt`).forEach((b,j)=>{
        b.onclick=null;
        if(j===i) b.classList.add('chosen');
      });
      path.push(node.opts[i].text.slice(0,36)+'…');
      setTimeout(()=>renderNode(node.opts[i].next,d+1),500);
    };
  }
  renderNode(DECISION_TREE,0);
}

// ──────────────────────────────
// INIT
// ──────────────────────────────
updateHome();
